    <!-- inmueble.js mejorado inline para aprovechar nuevos elementos sin romper el JS original -->
    <script type="module">
        import { apiGet } from "/dist/api.js";

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const codigo = params.get("codigo");

            if (!codigo) {
                mostrarError("No se encontró el código del inmueble.");
                return;
            }

            cargarInmueble(codigo);
        });

        function mostrarError(msg) {
            document.getElementById("skeleton-detalle").innerHTML = `
                <div style="text-align:center; padding:4rem 2rem; color:#888;">
                    <div style="font-size:3rem; margin-bottom:1rem;">🏚️</div>
                    <h3 style="color:#555; margin-bottom:0.5rem;">Inmueble no encontrado</h3>
                    <p>${msg}</p>
                    <a href="buscar_inmuebles.html" style="display:inline-block; margin-top:1.5rem; padding:0.8rem 1.5rem; background:#e56d11; color:#fff; border-radius:10px; text-decoration:none; font-weight:700;">
                        Ver todos los inmuebles
                    </a>
                </div>
            `;
        }

        async function cargarInmueble(codigo) {
            try {
                const data = await apiGet(`ApiSimiweb/response/v2/inmueble/codInmueble/${codigo}`);
                console.log("DATA API:", data);

                // ── TÍTULO
                const tipo = data.Tipo_Inmueble || data.Tipo || data.Titulo_Web || "Inmueble";
                const barrio = data.Barrio || data.barrio || "";
                const tituloTexto = barrio ? `${tipo} en ${barrio}` : tipo;

                document.getElementById("titulo").textContent = tituloTexto;
                document.getElementById("breadcrumb-titulo").textContent = tituloTexto;
                document.title = `${tituloTexto} — RE Inmobiliaria SAS`;

                // ── OPERACIÓN badge
                const operacionEl = document.getElementById("operacion");
                const gestion = data.Gestion || "";
                if (gestion === "Arriendo") {
                    operacionEl.textContent = "En arriendo";
                    operacionEl.className = "badge-operacion";
                } else if (gestion === "Venta") {
                    operacionEl.textContent = "En venta";
                    operacionEl.className = "badge-operacion venta";
                } else if (gestion.includes("Venta")) {
                    operacionEl.textContent = "Arriendo y Venta";
                    operacionEl.className = "badge-operacion ambos";
                } else {
                    operacionEl.textContent = gestion || "Disponible";
                }

                // ── PRECIO
                let precio = null;
                let precioLabel = "";
                if (gestion === "Arriendo") {
                    precio = data.ValorCanon;
                    precioLabel = "Canon mensual";
                } else if (gestion === "Venta") {
                    precio = data.ValorVenta;
                    precioLabel = "Precio de venta";
                } else {
                    precio = data.ValorCanon || data.ValorVenta;
                    precioLabel = data.ValorCanon ? "Canon mensual" : "Precio de venta";
                }

                document.getElementById("precio").textContent =
                    precio ? `$${Number(precio).toLocaleString("es-CO")}` : "Consultar precio";
                document.getElementById("precio-label").textContent = precioLabel;

                // ── SPECS RÁPIDAS
                const specsRapidas = document.getElementById("specs-rapidas");
                const specs = [
                    { icon: "assets/icon/hab-icon.svg", val: data.alcobas || data.Alcobas, label: "Habitaciones" },
                    { icon: "assets/icon/banio2-icon.svg", val: data.banos || data.banios, label: "Baños" },
                    { icon: "assets/icon/area-icon.svg", val: data.AreaConstruida ? `${data.AreaConstruida} ` : null, label: "Área" },
                ];
                specs.forEach(s => {
                    if (!s.val || s.val === "0") return;
                    const div = document.createElement("div");
                    div.className = "spec-item";
                    div.innerHTML = `
                        <img src="${s.icon}" class="spec-icon icon" alt="${s.label}">
                        <span class="spec-val">${s.val}</span>
                        <span class="spec-label">${s.label}</span>
                    `;
                    specsRapidas.appendChild(div);
                });

                // ── CÓDIGO REF
                document.getElementById("codigo-ref").textContent = `Ref. #${codigo}`;

                // ── DESCRIPCIÓN
                document.getElementById("descripcion").textContent =
                    data.descripcionlarga || data.Descripcion || "Sin descripción disponible.";

                // ── WHATSAPP
                const mensaje = `Hola, vi el inmueble ${tituloTexto} (ref. ${codigo}) y quisiera más información.`;
                document.getElementById("btn-whatsapp").href =
                    `https://wa.me/573213770000?text=${encodeURIComponent(mensaje)}`;

                // ── IMÁGENES
                cargarImagenes(data);

                // ── DETALLES TÉCNICOS
                cargarDetalles(data);

                // ── COMODIDADES
                cargarComodidades(data);

                // ── Mostrar página, ocultar skeleton
                document.getElementById("skeleton-detalle").style.display = "none";
                document.getElementById("detalle-page").style.display = "block";

                // ── MAPA (después de mostrar la página para que Leaflet mida el contenedor)
                cargarMapa(data, codigo);

            } catch (error) {
                console.error("ERROR:", error);
                mostrarError("Hubo un problema cargando la información. Intente de nuevo.");
            }
        }

        function cargarImagenes(data) {
            const principal = document.getElementById("imagen-principal");
            const miniaturas = document.getElementById("miniaturas");
            const btnPrev = document.querySelector(".galeria-btn.prev");
            const btnNext = document.querySelector(".galeria-btn.next");
            const counter = document.getElementById("foto-counter");

            if (!data.fotos || data.fotos.length === 0) {
                principal.src = "assets/img/no-image.jpg";
                counter.style.display = "none";
                return;
            }

            const fotos = data.fotos.map(f => f.foto);
            let indiceActual = 0;
            let thumbs = [];

            counter.textContent = `1 / ${fotos.length}`;

            const actualizarActiva = () => {
                thumbs.forEach((img, i) => img.classList.toggle("activa", i === indiceActual));
                counter.textContent = `${indiceActual + 1} / ${fotos.length}`;
                const activa = thumbs[indiceActual];
                if (activa) centrarMiniatura(activa);
            };

            const cambiarImagen = (nuevoIndice, direccion = 1) => {
                if (nuevoIndice === indiceActual) return;

                const imgOld = document.createElement("img");
                imgOld.src = fotos[indiceActual];
                imgOld.className = "img-old";

                const imgNew = document.createElement("img");
                imgNew.src = fotos[nuevoIndice];
                imgNew.className = "img-anim";
                imgNew.style.transform = `translateX(${direccion * 100}%)`;
                imgNew.style.opacity = "1";

                principal.parentElement.append(imgOld, imgNew);

                requestAnimationFrame(() => {
                    imgOld.style.opacity = "0";
                    imgOld.style.filter = "blur(100px)";
                    imgOld.style.transform = `translateX(${-direccion * 40}px)`;
                    imgNew.style.transform = "translateX(0)";
                });

                setTimeout(() => {
                    principal.src = fotos[nuevoIndice];
                    imgOld.remove();
                    imgNew.remove();
                    indiceActual = nuevoIndice;
                    actualizarActiva();
                }, 450);
            };

            principal.src = fotos[0];

            fotos.forEach((src, index) => {
                const img = document.createElement("img");
                img.src = src;
                img.addEventListener("click", () => cambiarImagen(index, index > indiceActual ? 1 : -1));
                miniaturas.appendChild(img);
                thumbs.push(img);
            });

            actualizarActiva();

            btnPrev.addEventListener("click", () => {
                cambiarImagen((indiceActual - 1 + fotos.length) % fotos.length, -1);
            });
            btnNext.addEventListener("click", () => {
                cambiarImagen((indiceActual + 1) % fotos.length, 1);
            });

            // Swipe en móvil
            let touchStartX = 0;
            principal.parentElement.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
            principal.parentElement.addEventListener("touchend", e => {
                const diff = touchStartX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) cambiarImagen((indiceActual + 1) % fotos.length, 1);
                    else cambiarImagen((indiceActual - 1 + fotos.length) % fotos.length, -1);
                }
            });

            setTimeout(() => actualizarActiva(), 150);

            // Inicializar lightbox pasando getter del índice actual
            initLightbox(fotos, () => indiceActual);
        }

        /* ── LIGHTBOX ── */
        function initLightbox(fotos, getIndiceActual) {
            const lb = document.getElementById("lightbox");
            const lbImg = document.getElementById("lightbox-img");
            const lbCounter = document.getElementById("lb-counter");
            const lbClose = document.getElementById("lightbox-close");
            const lbPrev = document.getElementById("lb-prev");
            const lbNext = document.getElementById("lb-next");
            const lbInner = document.getElementById("lightbox-inner");
            let lbIdx = 0;

            const header = document.getElementById("main-header-container");

            const abrir = (idx) => {
                lbIdx = (idx + fotos.length) % fotos.length;
                lbImg.src = fotos[lbIdx];
                lbCounter.textContent = `${lbIdx + 1} / ${fotos.length}`;
                lb.classList.add("open");
                document.body.style.overflow = "hidden";
                if (header) header.style.display = "none";
            };

            const cerrar = () => {
                lb.classList.remove("open");
                document.body.style.overflow = "";
                if (header) header.style.display = "";
            };

            const navegar = (dir) => {
                lbIdx = (lbIdx + dir + fotos.length) % fotos.length;
                lbImg.style.animation = "none";
                requestAnimationFrame(() => {
                    lbImg.style.animation = "";
                    lbImg.src = fotos[lbIdx];
                    lbCounter.textContent = `${lbIdx + 1} / ${fotos.length}`;
                });
            };

            // Abrir al clic en imagen principal
            document.getElementById("imagen-principal").addEventListener("click", () => abrir(getIndiceActual()));

            lbClose.addEventListener("click", cerrar);
            lbPrev.addEventListener("click", () => navegar(-1));
            lbNext.addEventListener("click", () => navegar(1));

            // Clic en fondo cierra
            lb.addEventListener("click", (e) => { if (e.target === lb || e.target === lbInner) cerrar(); });

            // Teclado
            document.addEventListener("keydown", (e) => {
                if (!lb.classList.contains("open")) return;
                if (e.key === "Escape") cerrar();
                if (e.key === "ArrowLeft") navegar(-1);
                if (e.key === "ArrowRight") navegar(1);
            });

            // Swipe en lightbox
            let swipeX = 0;
            lbImg.addEventListener("touchstart", e => { swipeX = e.touches[0].clientX; });
            lbImg.addEventListener("touchend", e => {
                const d = swipeX - e.changedTouches[0].clientX;
                if (Math.abs(d) > 50) navegar(d > 0 ? 1 : -1);
            });

            // Miniaturas también abren el lightbox
            document.getElementById("miniaturas").addEventListener("click", (e) => {
                const img = e.target.closest("img");
                if (!img) return;
                const idx = [...img.parentElement.children].indexOf(img);
                abrir(idx);
            });
        }

        function centrarMiniatura(img) {
            const contenedor = img.parentElement;
            const desplazamiento = img.getBoundingClientRect().left
                - contenedor.getBoundingClientRect().left
                - (contenedor.clientWidth / 2)
                + (img.clientWidth / 2);
            contenedor.scrollBy({ left: desplazamiento, behavior: "smooth" });
        }

        function cargarDetalles(data) {
            const lista = [
                { label: "Área construida", value: data.AreaConstruida ? `${data.AreaConstruida} m²` : null },
                { label: "Área privada", value: data.AreaPrivada ? `${data.AreaPrivada} m²` : null },
                { label: "Habitaciones", value: data.alcobas || data.Alcobas },
                { label: "Baños", value: data.banos || data.banios },
                { label: "Garajes", value: data.garaje || data.garajes || data.Garaje },
                { label: "Estrato", value: data.Estrato || data.estrato },
                { label: "Piso", value: data.piso },
                { label: "Antigüedad", value: data.Antiguedad || data.antiguedad },
                { label: "Año construcción", value: data.AnioConstruccion || data.anioConstruccion },
                { label: "Estado", value: data.Estado || data.estado },
                { label: "Administración", value: data.Administracion ? `$${Number(data.Administracion).toLocaleString("es-CO")}` : null },
                { label: "Portería", value: data.Porteria ? "Sí" : null },
                { label: "Ascensor", value: data.Ascensor ? "Sí" : null },
                { label: "Amoblado", value: data.Amoblado ? "Sí" : null },
                { label: "Gas natural", value: data.GasNatural ? "Sí" : null },
                { label: "Balcón", value: data.Balcon ? "Sí" : null },
                { label: "Terraza", value: data.Terraza ? "Sí" : null },
                { label: "Patio", value: data.Patio ? "Sí" : null },
                { label: "Depósito", value: data.Deposito ? "Sí" : null },
            ];

            const cont = document.getElementById("detalles");
            let hayDetalles = false;

            lista.forEach(item => {
                if (!item.value || item.value === "0" || item.value === 0) return;
                hayDetalles = true;
                const div = document.createElement("div");
                div.className = "detalle-item";
                div.innerHTML = `
                    <span class="det-label">${item.label}</span>
                    <span class="det-val">${item.value}</span>
                `;
                cont.appendChild(div);
            });

            if (hayDetalles) {
                document.getElementById("sec-detalles").style.display = "block";
            }
        }

        function cargarComodidades(data) {
            const fuentes = [
                data.caracteristicas,
                data.caracteristicasInternas,
                data.caracteristicasExternas,
                data.Caracteristicas_Adicionales
            ];

            let comodidades = [];
            fuentes.forEach(f => {
                if (Array.isArray(f)) {
                    f.forEach(item => {
                        const nombre = item.nombre || item.Nombre;
                        if (nombre) comodidades.push(nombre);
                    });
                }
            });

            comodidades = [...new Set(comodidades)];
            if (comodidades.length === 0) return;

            const listaEl = document.getElementById("comodidades");
            comodidades.forEach(nombre => {
                const span = document.createElement("span");
                span.className = "comodidad-tag";
                span.textContent = nombre;
                listaEl.appendChild(span);
            });

            document.getElementById("sec-comodidades").style.display = "block";
        }

        function cargarMapa(data, codigo) {
            const mapaEl = document.getElementById("mapa");
            const btnLlegar = document.getElementById("btn-como-llegar");

            const latRaw = data.Latitud ?? data.Lat ?? data.latitud ?? data.lat;
            const lonRaw = data.Longitud ?? data.Lon ?? data.longitud ?? data.lon ?? data.Lng ?? data.lng;
            const lat = latRaw !== undefined ? Number(latRaw) : NaN;
            const lon = lonRaw !== undefined ? Number(lonRaw) : NaN;

            const direccion = data.Direccion || data.direccion
                || [data.Barrio, data.Ciudad, data.Departamento].filter(Boolean).join(", ");

            if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
                // Sin coordenadas: ocultar mapa y botón
                document.getElementById("sec-mapa").style.display = "none";
                btnLlegar.style.display = "none";
                return;
            }

            // Botón "Cómo llegar" — scroll suave a la sección del mapa
            btnLlegar.href = "#";
            btnLlegar.removeAttribute("target");
            btnLlegar.removeAttribute("rel");
            btnLlegar.addEventListener("click", (e) => {
                e.preventDefault();
                document.getElementById("sec-mapa").scrollIntoView({ behavior: "smooth", block: "start" });
            });

            // Pequeño desplazamiento aleatorio (≤ 40 m) para no revelar el punto exacto
            const offsetLat = (Math.random() - 0.5) * 0.00072; // ~40 m en latitud
            const offsetLon = (Math.random() - 0.5) * 0.00072;
            const latAprox = lat + offsetLat;
            const lonAprox = lon + offsetLon;

            // Inicializar mapa Leaflet
            const map = L.map(mapaEl, {
                center: [latAprox, lonAprox],
                zoom: 16,
                zoomControl: true,
                scrollWheelZoom: false,
            });

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© <a href='https://openstreetmap.org'>OpenStreetMap</a>",
                maxZoom: 19,
            }).addTo(map);

            // Círculo naranja de 50 m (ubicación aproximada)
            L.circle([latAprox, lonAprox], {
                radius: 50,
                color: "#e56d11",
                weight: 2,
                opacity: 0.85,
                fillColor: "#e56d11",
                fillOpacity: 0.22,
            }).addTo(map);
        }
    </script>
